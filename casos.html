<script>
    const carouselImages = document.getElementById('carouselImages');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let currentIndex = 0;
    let totalImages = 0;
    function updateCarousel() { if(carouselImages) carouselImages.style.transform = `translateX(-${currentIndex * 100}%)`; }
    function nextImage() { if(totalImages===0) return; currentIndex = (currentIndex+1)%totalImages; updateCarousel(); }
    function prevImage() { if(totalImages===0) return; currentIndex = (currentIndex-1+totalImages)%totalImages; updateCarousel(); }
    if(prevBtn && nextBtn) {
        window.addEventListener('load', () => { totalImages = document.querySelectorAll('.carousel-img').length; updateCarousel(); });
        nextBtn.addEventListener('click', nextImage);
        prevBtn.addEventListener('click', prevImage);
        window.addEventListener('resize', updateCarousel);
    }
</script>
